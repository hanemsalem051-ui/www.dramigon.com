<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Dramigon | The Footballers' Hub</title>
                <style>
                        /* General Styles */
                                body {
                                            margin: 0;
                                                        padding: 0;
                                                                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                                                                                /* A deep, sporty green gradient */
                                                                                            background: linear-gradient(135deg, #0a2e0a 0%, #155c15 100%);
                                                                                                        color: white;
                                                                                                                    display: flex;
                                                                                                                                flex-direction: column;
                                                                                                                                            align-items: center;
                                                                                                                                                        min-height: 100vh;
                                                                                                                                                                }

                                                                                                                                                                        /* Navigation */
                                                                                                                                                                                nav {
                                                                                                                                                                                            width: 100%;
                                                                                                                                                                                                        padding: 20px 0;
                                                                                                                                                                                                                    background: rgba(0, 0, 0, 0.2);
                                                                                                                                                                                                                                text-align: center;
                                                                                                                                                                                                                                            border-bottom: 2px solid #2ecc71;
                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                            .logo {
                                                                                                                                                                                                                                                                        font-size: 2rem;
                                                                                                                                                                                                                                                                                    font-weight: bold;
                                                                                                                                                                                                                                                                                                letter-spacing: 2px;
                                                                                                                                                                                                                                                                                                            color: #2ecc71;
                                                                                                                                                                                                                                                                                                                        text-transform: uppercase;
                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                        /* Hero Section */
                                                                                                                                                                                                                                                                                                                                                .hero {
                                                                                                                                                                                                                                                                                                                                                            text-align: center;
                                                                                                                                                                                                                                                                                                                                                                        padding: 100px 20px;
                                                                                                                                                                                                                                                                                                                                                                                    max-width: 800px;
                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                    h1 {
                                                                                                                                                                                                                                                                                                                                                                                                                font-size: 3.5rem;
                                                                                                                                                                                                                                                                                                                                                                                                                            margin-bottom: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                        text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                        p {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 1.2rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                opacity: 0.9;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            margin-bottom: 30px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* Buttons */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .cta-button {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background-color: #2ecc71;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            color: #0a2e0a;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        padding: 15px 40px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    text-decoration: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-weight: bold;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border-radius: 50px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        transition: transform 0.2s, background-color 0.2s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    display: inline-block;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .cta-button:hover {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background-color: #27ae60;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transform: scale(1.05);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* Pitch Graphic (Visual Element) */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .pitch-line {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                width: 80%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            height: 2px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        background: rgba(255, 255, 255, 0.1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    margin: 50px 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <nav>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="logo">Dramigon</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </nav>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <section class="hero">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h1>Level Up Your Game</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p>The ultimate platform for elite footballers to track stats, scout talent, and dominate the field.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <a href="#" class="cta-button">JOIN THE SQUAD</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </section>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="pitch-line"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
